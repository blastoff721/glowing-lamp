<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Failed | Itihaasa</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      .card {
        background: white;
        padding: 40px;
        border-radius: 15px;
        text-align: center;
        max-width: 600px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      }

      .icon {
        font-size: 70px;
      }

      h1 {
        color: #b22222;
      }

      .button {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 24px;
        background: #8b0000;
        color: white;
        text-decoration: none;
        border-radius: 8px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="icon">❌</div>

      <h1>Payment Unsuccessful</h1>

      <p>Your payment could not be completed.</p>

      <p>This may happen if:</p>

      <ul style="text-align: left; display: inline-block">
        <li>The payment was cancelled.</li>
        <li>The UPI app was closed.</li>
        <li>The bank declined the transaction.</li>
        <li>There was a temporary network issue.</li>
      </ul>

      <p>Please try again.</p>

      <a class="button" href="/checkout.html"> Try Again </a>
    </div>
  </body>
</html>
